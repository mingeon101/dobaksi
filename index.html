<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dobaksite</title>
    <style>
        :root {
            --gold: #ffd700; --neon-blue: #00f3ff; --neon-pink: #ff0055;
            --bg-dark: #0f0f0f; --card-bg: #1a1a1a; --danger: #ff3c3c; --success: #2ecc71;
        }

        body {
            background-color: var(--bg-dark); color: white;
            font-family: 'Pretendard', sans-serif; display: flex;
            flex-direction: column; align-items: center; min-height: 100vh;
            margin: 0; padding: 20px;
        }

        /* 상단 유저 바 */
        .auth-bar { width: 100%; max-width: 450px; display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 10px; align-items: center; }
        #userPhoto { width: 30px; height: 30px; border-radius: 50%; display: none; border: 1px solid var(--neon-blue); }
        .auth-btn { background: #333; color: white; border: none; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }

        /* 자산 정보창 */
        .header-stats { width: 100%; max-width: 450px; background: #000; padding: 20px; border-radius: 20px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-sizing: border-box; }
        #totalBalance { font-size: 1.6rem; font-weight: 900; color: var(--gold); }
        .action-btns { display: flex; gap: 5px; margin-top: 5px; }
        .refill-btn { background: var(--neon-blue); border: none; color: #000; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .withdraw-btn { background: var(--neon-pink); border: none; color: #fff; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }

        /* 게임 선택 탭 */
        .tab-menu { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { padding: 10px 15px; border: none; background: #222; color: #888; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .tab-btn.active { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }

        /* 게임 구역 공통 */
        .game-container { width: 100%; max-width: 450px; background: var(--card-bg); padding: 25px; border-radius: 30px; border: 1px solid #333; display: none; text-align: center; box-sizing: border-box; }
        .game-container.active { display: block; }

        /* 입력 및 버튼 UI */
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
